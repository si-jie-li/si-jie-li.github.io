---

{% include base_path %}

<!doctype html>
<html lang="{{ site.locale | slice: 0,2 }}" class="no-js">
  <head>
    {% include head.html %}
    {% include head/custom.html %}
    <!-- back to top -->
    <style>
      #back-to-top {
        position: fixed;
        bottom: 100px;
        right: 100px;
        display: none;
        width: 44px;
        height: 44px;
        line-height: 44px;
        text-align: center;
        background-color: var(--global-link-color);
        color: white;
        opacity: 0.5;
        padding: 0;
        border-radius: 50%;
        font-size: 1.2em;
        cursor: pointer;
        box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        z-index: 9999;
        transition: opacity 0.2s ease;
      }
      #back-to-top:hover {
        opacity: 0.8;
      }
    </style>
  </head>

  <body>

    {% include browser-upgrade.html %}
    {% include masthead.html %}

    {{ content }}
    <!-- back to top -->
    <div id="back-to-top">↑</div>

    <div class="page__footer">
      <footer>
        {% include footer/custom.html %}
        {% include footer.html %}
      </footer>
    </div>

    {% include scripts.html %}
    <!-- back to top -->
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const backToTopButton = document.getElementById('back-to-top');
    
        window.onscroll = function() {
          if (document.body.scrollTop > 100 || document.documentElement.scrollTop > 100) {
            backToTopButton.style.display = "block";
          } else {
            backToTopButton.style.display = "none";
          }
        };
    
        backToTopButton.onclick = function() {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        };
      });
    </script>
    <script>
      // Floating TOC — works even when GitHub Pages strips id attrs from headings
      document.addEventListener('DOMContentLoaded', function() {
        var tocList = document.getElementById('toc-list');
        var tocContainer = document.getElementById('floating-toc');
        if (!tocList || !tocContainer) return;

        var content = document.querySelector('.page__content');
        if (!content) { tocContainer.style.display = 'none'; return; }

        // Generate a URL-safe slug from text
        function slugify(text) {
          return 'toc-' + text.toLowerCase()
            .replace(/[^\w\s-]/g, '').replace(/\s+/g, '-').replace(/^-+|-+$/g, '')
            || 'toc-section';
        }

        // Extract visible text from a heading node only (skip nested divs/etc.)
        function headingText(h) {
          var text = '';
          for (var i = 0; i < h.childNodes.length; i++) {
            if (h.childNodes[i].nodeType === 3) text += h.childNodes[i].textContent;
          }
          return text.trim() || h.textContent.trim().split('\n')[0].trim();
        }

        // Open all ancestor <details> then smooth-scroll to element
        function openAndScroll(el) {
          var node = el.parentElement;
          while (node && node !== document.documentElement) {
            if (node.tagName && node.tagName.toLowerCase() === 'details') node.open = true;
            node = node.parentElement;
          }
          setTimeout(function() { el.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 60);
        }

        var sections = [];
        var usedIds = {};

        // Pass 1: headings inside <summary> (section titles).
        // GitHub Pages may strip id= from h1/h2 in HTML blocks, so we assign
        // a slug-based id when one is missing rather than skipping the heading.
        content.querySelectorAll('summary').forEach(function(summary) {
          var h = summary.querySelector('h1, h2');
          if (!h) return;
          if (!h.id) {
            var base = slugify(h.textContent), slug = base, n = 1;
            while (usedIds[slug]) slug = base + '-' + (n++);
            h.id = slug;
          }
          usedIds[h.id] = true;
          sections.push(h);
        });

        // Pass 2: standalone h1/h2 that are NOT inside a summary
        content.querySelectorAll('h1, h2').forEach(function(h) {
          if (h.closest && h.closest('summary')) return;
          if (!h.id) {
            var base = slugify(h.textContent), slug = base, n = 1;
            while (usedIds[slug]) slug = base + '-' + (n++);
            h.id = slug;
          }
          if (usedIds[h.id]) return;
          usedIds[h.id] = true;
          sections.push(h);
        });

        if (sections.length < 2) { tocContainer.style.display = 'none'; return; }

        // Sort by DOM order
        sections.sort(function(a, b) {
          return a.compareDocumentPosition(b) & Node.DOCUMENT_POSITION_FOLLOWING ? -1 : 1;
        });

        // Build nested TOC list (h1 = top-level, h2 = sub-item)
        var currentH1Li = null, currentSubList = null;

        sections.forEach(function(h) {
          var a = document.createElement('a');
          a.href = '#' + h.id;
          a.textContent = headingText(h);
          a.addEventListener('click', function(e) {
            e.preventDefault();
            openAndScroll(h);
            history.pushState(null, '', '#' + h.id);
          });

          var li = document.createElement('li');
          li.appendChild(a);

          if (h.tagName.toLowerCase() === 'h1') {
            tocList.appendChild(li);
            currentH1Li = li;
            currentSubList = null;
          } else {
            if (currentH1Li) {
              if (!currentSubList) {
                currentSubList = document.createElement('ul');
                currentH1Li.appendChild(currentSubList);
              }
              currentSubList.appendChild(li);
            } else {
              tocList.appendChild(li);
            }
          }
        });

        // Scroll-aware active section highlighting via IntersectionObserver
        var observer = new IntersectionObserver(function(entries) {
          entries.forEach(function(entry) {
            if (entry.isIntersecting) {
              tocContainer.querySelectorAll('a').forEach(function(l) { l.classList.remove('toc--active'); });
              var link = tocContainer.querySelector('a[href="#' + entry.target.id + '"]');
              if (link) link.classList.add('toc--active');
            }
          });
        }, { rootMargin: '-80px 0px -60% 0px', threshold: 0 });

        sections.forEach(function(h) { observer.observe(h); });
      });
    </script>
    <script>
      (function () {
        function openDetailsFromHash() {
          if (!location.hash) return;
          const id = decodeURIComponent(location.hash.slice(1));
          const el = document.getElementById(id);
          if (!el) return;
      
          // 向上找所有 <details>，逐个展开
          let node = el;
          while (node && node !== document.documentElement) {
            if (node.tagName && node.tagName.toLowerCase() === 'details') {
              node.open = true;
            }
            node = node.parentElement;
          }
      
          // 平滑滚动到目标并可选高亮
          el.scrollIntoView({ behavior: 'smooth', block: 'start' });
          el.classList.add('hash-target');
          setTimeout(() => el.classList.remove('hash-target'), 2000);
        }
      
        document.addEventListener('DOMContentLoaded', openDetailsFromHash);
        window.addEventListener('hashchange', openDetailsFromHash);
      })();
      </script>
      
      <style>
      /* 可选：锚点高亮两秒 */
      .hash-target {
        outline: 2px solid currentColor;
        background: rgba(255, 255, 0, 0.2);
        transition: background 0.6s ease;
      }
      </style>
      
  </body>
</html>
